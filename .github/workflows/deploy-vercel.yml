name: Deploy to Vercel (Production)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID."
            exit 1
          fi

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Pull Vercel environment
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for Vercel
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
