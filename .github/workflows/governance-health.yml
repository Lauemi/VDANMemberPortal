name: governance-health

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      fail_on_yellow:
        description: "Fail build when yellow clubs exist"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Governance Health Gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOV_FAIL_ON_YELLOW: ${{ github.event.inputs.fail_on_yellow || 'false' }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY"
            exit 2
          fi
          npm run check:governance-health
