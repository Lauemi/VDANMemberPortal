name: Smoke Invite 375

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'tests/playwright/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/smoke-invite-375.yml'

jobs:
  smoke-invite-375:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 20
    env:
      PUBLIC_SUPABASE_URL: https://smoke.supabase.local
      PUBLIC_SUPABASE_ANON_KEY: smoke-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build site
        run: npm run build

      - name: Run 375px invite smoke
        run: npm run test:smoke:invite-375

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke-invite-375
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
